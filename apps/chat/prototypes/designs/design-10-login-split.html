<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müsait Chat - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg: #0C0C0C;
            --text: #FFF;
            --text-dim: #888;
            --accent: #E2E2E2;
            --border: #222;
            --glow: #4F46E5;
            --font: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Left panel: Login form */
        .left-panel {
            width: 45%;
            max-width: 600px;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
            background: rgba(12, 12, 12, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #4F46E5, #EC4899);
            border-radius: 6px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        p.sub {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .input-grp {
            margin-bottom: 24px;
        }

        .input-grp label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: #151515;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 16px;
            color: var(--text);
            font-family: var(--font);
            outline: none;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            background: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--text);
            color: var(--bg);
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .btn-ss {
            background: #151515;
            border: 1px solid var(--border);
            color: var(--text);
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-ss:hover {
            background: #222;
            border-color: #444;
        }

        /* Right panel: Dynamic Graphic */
        .right-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #4F46E5;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #EC4899;
            bottom: -50px;
            left: 100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #F59E0B;
            top: 40%;
            right: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: scale(1) translate(0, 0);
            }

            33% {
                transform: scale(1.1) translate(50px, -50px);
            }

            66% {
                transform: scale(0.9) translate(-50px, 50px);
            }

            100% {
                transform: scale(1) translate(0, 0);
            }
        }

        .glass-card {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transform: perspective(1000px) rotateY(-10deg) rotateX(5deg);
            transition: 0.5s;
        }

        .right-panel:hover .glass-card {
            transform: perspective(1000px) rotateY(0deg) rotateX(0deg);
        }

        .quote {
            font-size: 24px;
            font-weight: 300;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        .author {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Media queries */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 40px;
            }

            .right-panel {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="left-panel">
        <div class="logo">Müsait Chat</div>

        <div class="login-container">
            <h1>Welcome Back</h1>
            <p class="sub">Log in to monitor and control AI agents.</p>

            <div class="input-grp">
                <label>Work Email</label>
                <div class="input-wrapper">
                    <input type="email" placeholder="name@company.com" id="email">
                </div>
            </div>

            <div class="input-grp">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" placeholder="••••••••" id="pass">
                </div>
            </div>

            <button class="btn" onclick="document.getElementById('email').value='Signing in...'">Sign In →</button>

            <div class="divider">OR CONTINUE WITH</div>

            <button class="btn btn-ss">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z">
                    </path>
                </svg>
                Single Sign-On (SSO)
            </button>
        </div>
    </div>

    <div class="right-panel">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="glass-card">
            <div class="quote">"Control the narrative. Empower the AI where it shines, step in where human empathy is
                required."</div>
            <div class="author">Operator Dashboard Guidelines</div>
        </div>
    </div>

</body>

</html>
