<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design 5 — Mock Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --surface: #0f0f12;
            --surface-2: #16161a;
            --surface-3: #1e1e24;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --accent-glow-strong: rgba(99, 102, 241, 0.35);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --red: #ef4444;
            --text: #eeeef0;
            --text-secondary: #8b8b9e;
            --text-muted: #4a4a5e;
            --border: #24242e;
            --border-hover: #34344a;
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Instrument Serif', serif;
            --font-mono: 'Geist Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            background: var(--bg);
        }

        /* === GRAIN === */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        }

        /* === BG GLOW === */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-glow .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.08);
            top: -15%;
            right: -10%;
            animation: blobFloat 25s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.05);
            bottom: -20%;
            left: -10%;
            animation: blobFloat 20s ease-in-out infinite reverse;
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -40px);
            }
        }

        /* === MAIN LAYOUT === */
        .login-page {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: containerIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes containerIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* === BRANDING === */
        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 32px var(--accent-glow-strong);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {

            0%,
            100% {
                box-shadow: 0 8px 32px var(--accent-glow);
            }

            50% {
                box-shadow: 0 8px 48px var(--accent-glow-strong), 0 0 0 8px rgba(99, 102, 241, 0.05);
            }
        }

        .brand h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* === CARD === */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.3);
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input.error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .error-msg {
            font-size: 12px;
            color: var(--red);
            margin-top: 6px;
            display: none;
            animation: shakeIn 0.4s ease-out;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes shakeIn {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        /* Password field container */
        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* Remember + Forgot */
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-wrap input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-wrap label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--accent-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* Submit */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow-strong);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .btn-loading {
            display: inline;
        }

        .btn-loading {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social Buttons */
        .social-btns {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: var(--surface-3);
            border-color: var(--border-hover);
            color: var(--text);
        }

        .social-icon {
            font-size: 16px;
        }

        /* === FOOTER === */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* === SUCCESS STATE === */
        .success-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(8, 8, 10, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .success-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .success-check {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--green-dim);
            border: 2px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            animation: successPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes successPop {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .success-title {
            font-family: var(--font-serif);
            font-size: 28px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .success-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* === VERSION INFO === */
        .version-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
                border-radius: 16px;
            }

            .brand h1 {
                font-size: 26px;
            }

            .brand-logo {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }

            .social-btns {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-page">
        <div class="login-container">
            <!-- BRAND -->
            <div class="brand">
                <div class="brand-logo">M</div>
                <h1>Müsait Chat</h1>
                <p>İşletme kontrol panelinize giriş yapın</p>
            </div>

            <!-- CARD -->
            <div class="login-card">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="email">E-posta</label>
                        <input class="form-input" id="email" type="email" placeholder="ornek@isletme.com"
                            autocomplete="email" required />
                        <div class="error-msg" id="email-error">Geçerli bir e-posta adresi girin</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Şifre</label>
                        <div class="password-wrap">
                            <input class="form-input" id="password" type="password" placeholder="••••••••"
                                autocomplete="current-password" required />
                            <button type="button" class="toggle-password" onclick="togglePassword()"
                                id="toggle-pw">👁</button>
                        </div>
                        <div class="error-msg" id="password-error">Şifre en az 6 karakter olmalıdır</div>
                    </div>

                    <div class="form-row">
                        <div class="checkbox-wrap">
                            <input type="checkbox" id="remember" checked />
                            <label for="remember">Beni hatırla</label>
                        </div>
                        <a href="#" class="forgot-link">Şifremi unuttum</a>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <div class="spinner"></div>
                        <span class="btn-text">Giriş Yap</span>
                        <span class="btn-loading">Giriş yapılıyor...</span>
                    </button>
                </form>

                <div class="divider">veya</div>

                <div class="social-btns">
                    <button class="social-btn" onclick="mockSocial('Google')">
                        <span class="social-icon">G</span>
                        Google
                    </button>
                    <button class="social-btn" onclick="mockSocial('Apple')">
                        <span class="social-icon">🍎</span>
                        Apple
                    </button>
                </div>
            </div>

            <div class="login-footer">
                Hesabınız yok mu? <a href="#">İletişime geçin</a>
            </div>
        </div>
    </div>

    <!-- SUCCESS OVERLAY -->
    <div class="success-overlay" id="success">
        <div class="success-check">✓</div>
        <div class="success-title">Hoş geldiniz!</div>
        <div class="success-sub">Kontrol paneline yönlendiriliyorsunuz...</div>
    </div>

    <div class="version-info">MÜSAIT CHAT v2.0 · MOCK</div>

    <script>
        function togglePassword() {
            const pw = document.getElementById('password');
            const btn = document.getElementById('toggle-pw');
            if (pw.type === 'password') {
                pw.type = 'text';
                btn.textContent = '🔒';
            } else {
                pw.type = 'password';
                btn.textContent = '👁';
            }
        }

        function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const emailErr = document.getElementById('email-error');
            const pwErr = document.getElementById('password-error');
            const btn = document.getElementById('submit-btn');

            // Reset errors
            email.classList.remove('error');
            password.classList.remove('error');
            emailErr.classList.remove('visible');
            pwErr.classList.remove('visible');

            let hasError = false;

            // Validate email
            if (!email.value || !email.value.includes('@')) {
                email.classList.add('error');
                emailErr.classList.add('visible');
                hasError = true;
            }

            // Validate password
            if (!password.value || password.value.length < 6) {
                password.classList.add('error');
                pwErr.classList.add('visible');
                hasError = true;
            }

            if (hasError) return;

            // Mock loading
            btn.classList.add('loading');

            setTimeout(() => {
                btn.classList.remove('loading');
                document.getElementById('success').classList.add('visible');

                // Reset after 3 seconds
                setTimeout(() => {
                    document.getElementById('success').classList.remove('visible');
                }, 3000);
            }, 1500);
        }

        function mockSocial(provider) {
            const btn = document.getElementById('submit-btn');
            btn.classList.add('loading');

            setTimeout(() => {
                btn.classList.remove('loading');
                document.getElementById('success').classList.add('visible');

                setTimeout(() => {
                    document.getElementById('success').classList.remove('visible');
                }, 3000);
            }, 1200);
        }

        // Input focus animations
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.classList.remove('error');
                const err = input.closest('.form-group')?.querySelector('.error-msg');
                if (err) err.classList.remove('visible');
            });
        });
    </script>
</body>

</html>
