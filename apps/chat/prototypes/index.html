<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müsait Chat — Design Prototypes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
    }

    /* === SLIDE CONTAINER === */
    #slides-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
      z-index: 1;
    }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* === NAVIGATION === */
    #nav-controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
      user-select: none;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.7);
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .nav-btn.disabled {
      opacity: 0.25;
      cursor: not-allowed;
      pointer-events: none;
    }

    #page-indicator {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
      min-width: 48px;
      text-align: center;
      padding: 0 4px;
    }

    #page-indicator .current {
      color: #fff;
      font-size: 14px;
    }

    /* === DESIGN LABEL === */
    #design-label {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 9999;
      padding: 8px 16px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s ease;
    }

    #design-label .label-name {
      color: #fff;
      font-weight: 700;
    }

    /* === DOTS === */
    #dots {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 0 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      transform: scale(1.3);
    }

    .dot:hover:not(.active) {
      background: rgba(255, 255, 255, 0.4);
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      #nav-controls {
        bottom: 16px;
        right: 16px;
        padding: 6px 10px;
        gap: 6px;
        border-radius: 12px;
      }

      .nav-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }

      #design-label {
        bottom: 16px;
        left: 16px;
        padding: 6px 12px;
        font-size: 11px;
      }

      #page-indicator {
        font-size: 11px;
      }

      #page-indicator .current {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div id="slides-container"></div>

  <!-- Design Label -->
  <div id="design-label">
    <span class="label-name" id="label-text">Loading...</span>
  </div>

  <!-- Navigation -->
  <div id="nav-controls">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" aria-label="Previous design">←</button>
    <div id="dots"></div>
    <span id="page-indicator"><span class="current">1</span> / 5</span>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)" aria-label="Next design">→</button>
  </div>

  <script>
    // === DESIGN REGISTRY ===
    // To add a new design, just add an entry here. The system auto-discovers.
    const DESIGNS = [
      { file: 'designs/design-1-brutalist.html', name: 'Brutalist Terminal', tag: '#1' },
      { file: 'designs/design-2-glass.html', name: 'Glassmorphism', tag: '#2' },
      { file: 'designs/design-3-organic.html', name: 'Organic Warm', tag: '#3' },
      { file: 'designs/design-4-deco.html', name: 'Art Deco Luxury', tag: '#4' },
      { file: 'designs/design-5-login.html', name: 'Mock Login', tag: '#5' },
      { file: 'designs/design-6-neo-dark.html', name: 'Neo Dark', tag: '#6' },
      { file: 'designs/design-7-minimal-light.html', name: 'Minimal Soft', tag: '#7' },
      { file: 'designs/design-8-elegant-serif.html', name: 'Elegant Serif', tag: '#8' },
      { file: 'designs/design-9-retro-arcade.html', name: 'Retro Cyber', tag: '#9' },
      { file: 'designs/design-10-login-split.html', name: 'Split Login', tag: '#10' },
    ];

    let currentSlide = 0;

    // Build slides
    const container = document.getElementById('slides-container');
    const dotsEl = document.getElementById('dots');

    DESIGNS.forEach((d, i) => {
      // Create slide
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      slide.innerHTML = `<iframe src="${d.file}" loading="${i < 2 ? 'eager' : 'lazy'}" title="${d.name}"></iframe>`;
      container.appendChild(slide);

      // Create dot
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goTo(i);
      dotsEl.appendChild(dot);
    });

    function goTo(index) {
      if (index < 0 || index >= DESIGNS.length) return;

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');

      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');

      currentSlide = index;

      slides[currentSlide].classList.add('active');
      dots[currentSlide].classList.add('active');

      // Update indicator
      document.getElementById('page-indicator').innerHTML =
        `<span class="current">${currentSlide + 1}</span> / ${DESIGNS.length}`;

      // Update label
      document.getElementById('label-text').textContent =
        `${DESIGNS[currentSlide].tag}  ${DESIGNS[currentSlide].name}`;

      // Update button states
      document.getElementById('btn-prev').classList.toggle('disabled', currentSlide === 0);
      document.getElementById('btn-next').classList.toggle('disabled', currentSlide === DESIGNS.length - 1);
    }

    function navigate(dir) {
      goTo(currentSlide + dir);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Init
    goTo(0);
  </script>
</body>

</html>
